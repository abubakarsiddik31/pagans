name: Bug report
description: Report a reproducible problem in PAGANS
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide a minimal, reproducible case.
  - type: input
    id: pagans_version
    attributes:
      label: PAGANS version
      placeholder: e.g., 0.2.0
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: e.g., 3.12.2
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g., macOS 15.1 / Ubuntu 24.04
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Please include code/config needed to reproduce.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs/traceback
      render: shell
